<!DOCTYPE html>
<html lang="en" class="dark">
	<head>
		<meta charset="utf-8" />
		<link rel="icon" href="%sveltekit.assets%/favicon.png" />

		<!-- pre-loading font -->
		<link
			rel="preload"
			href="%sveltekit.assets%/fonts/NeueMontreal-Regular.otf"
			as="font"
			type="font/otf"
			crossorigin
		/>

		<meta name="viewport" content="width=device-width" />

		<!-- force dark mode -->
		<script>
			document.documentElement.classList.add('dark');
		</script>

		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover" data-theme="minimalist" class="dark">
		<div style="display: contents">%sveltekit.body%</div>

		<!-- goatcounter metrics -->
		<script>window.goatcounter = { no_onload: true }</script>
		<script data-goatcounter="https://warnav.goatcounter.com/count" async src="//gc.zgo.at/count.js"></script>
	</body>
</html>
